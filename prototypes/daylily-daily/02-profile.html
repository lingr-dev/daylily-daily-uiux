<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>萱草日签 - 我的</title>
  <link id="theme-css" rel="stylesheet" href="themes/default.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: 'rgb(var(--brand-primary) / <alpha-value>)',
              secondary: 'rgb(var(--brand-secondary) / <alpha-value>)',
              'primary-muted': 'rgb(var(--brand-primary-muted) / <alpha-value>)',
            },
            surface: {
              base: 'rgb(var(--surface-base) / <alpha-value>)',
              container: 'rgb(var(--surface-container) / <alpha-value>)',
              elevated: 'rgb(var(--surface-elevated) / <alpha-value>)',
            },
            feedback: {
              success: 'rgb(var(--feedback-success) / <alpha-value>)',
              warning: 'rgb(var(--feedback-warning) / <alpha-value>)',
            }
          },
          boxShadow: {
            'brand-sm': '0 2px 4px -1px rgb(var(--shadow-color) / 0.06), 0 1px 2px -1px rgb(var(--shadow-color) / 0.04)',
            'brand-md': '0 4px 6px -1px rgb(var(--shadow-color) / 0.1), 0 2px 4px -2px rgb(var(--shadow-color) / 0.05)',
          }
        }
      }
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .active-overlay { position: relative; overflow: hidden; }
    .active-overlay::after { content: ''; position: absolute; inset: 0; background-color: rgba(0,0,0,0); transition: background-color 0.1s; pointer-events: none; }
    .active-overlay:active::after { background-color: rgba(0,0,0,0.08); }
    .pro-shimmer {
      background: linear-gradient(110deg, transparent 40%, rgba(255, 215, 0, 0.4) 50%, transparent 60%);
      background-size: 200% 100%;
      animation: shimmer 3s infinite linear;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body class="bg-neutral-100 flex items-center justify-center min-h-screen font-sans antialiased text-[#4A443F]">
  <!-- Mobile Container -->
  <div class="relative w-full max-w-[375px] h-[812px] bg-[#F9F7F3] shadow-2xl overflow-hidden flex flex-col border-[8px] border-neutral-900 rounded-[50px]">
    
    <!-- Header NavBar -->
    <div class="shrink-0 z-50 bg-[#F9F7F3]/80 backdrop-blur-md">
      <div class="h-11 w-full"></div>
      <div class="h-11 w-full flex items-center justify-between px-4 relative">
        <div class="w-20"></div>
        <h2 class="text-[17px] font-bold text-[#2D2926]">我的空间</h2>
        <!-- 胶囊菜单占位 -->
        <div class="w-[87px]"></div>
      </div>
    </div>

    <!-- Scrollable Body -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-28 px-4 mt-2">
      
      <!-- 1. 个人名片与成就看板 -->
      <section class="flex items-center justify-between mt-4">
        <div class="flex items-center active-overlay cursor-pointer p-1 -ml-1 rounded-2xl">
          <div class="w-16 h-16 rounded-full border-2 border-white shadow-sm bg-neutral-200 flex items-center justify-center">
            <svg class="w-8 h-8 text-neutral-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </div>
          <div class="ml-4">
            <div class="flex items-center space-x-1">
              <h1 class="text-xl font-bold text-[#2D2926]">用户_A1B2</h1>
              <!-- Edit Icon -->
              <svg class="w-4 h-4 text-brand-primary/60 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </div>
            <div class="flex items-center mt-0.5">
              <span class="text-[11px] text-[#8C847E] font-medium">点击修改对外称呼或获取微信昵称</span>
            </div>
          </div>
        </div>
        
        <!-- 提醒能量 (Subscription Message Gamification) -->
        <div class="flex flex-col items-center bg-white shadow-sm rounded-xl p-2 active-overlay cursor-pointer">
          <div class="relative w-8 h-8 flex items-center justify-center">
            <svg class="w-6 h-6 text-brand-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            <div class="absolute -top-1 -right-1 bg-feedback-warning text-white text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center border border-white">2</div>
          </div>
          <span class="text-[9px] text-[#8C847E] font-medium mt-1">提醒能量</span>
        </div>
      </section>

      <!-- 2. 用药与照护枢纽 (Care Network Hub) -->
      <section class="mt-8 space-y-4">
        <h3 class="text-sm font-bold text-[#2D2926] px-1">日常用药计划</h3>
        
        <!-- 常态免费入口：我的计划 -->
        <div class="bg-white rounded-[24px] p-5 shadow-brand-sm active-overlay flex items-center justify-between cursor-pointer">
          <div class="flex items-center">
            <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-500">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
            </div>
            <div class="ml-4">
              <h4 class="text-base font-bold text-[#2D2926]">我的用药</h4>
              <p class="text-[11px] text-[#8C847E] font-medium mt-0.5">当前方案: 降压药 / 维生素</p>
            </div>
          </div>
          <svg class="w-5 h-5 text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </div>

        <h3 class="text-sm font-bold text-[#2D2926] px-1 mt-6">我的家人照护</h3>

        <!-- 常态免费：邀请家人监督我 -->
        <div class="bg-white rounded-[24px] p-5 shadow-brand-sm active-overlay space-y-3 cursor-pointer" onclick="window.location.href='09-family-management.html'">
          <div class="flex items-center justify-between">
            <div class="flex items-center space-x-1.5">
               <h4 class="text-[13px] font-bold text-[#2D2926]">我的家庭</h4>
               <svg class="w-3.5 h-3.5 text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
            </div>
            <span class="text-[11px] text-brand-primary font-bold bg-brand-primary/10 px-2 py-0.5 rounded-full">+ 管理家人</span>
          </div>
          <div class="flex items-center space-x-3 pt-1">
             <!-- Family Member 1 -->
             <div class="relative group cursor-pointer">
                <img class="w-10 h-10 rounded-full border border-neutral-100" src="https://api.dicebear.com/7.x/notionists/svg?seed=Lily&backgroundColor=fed7aa" alt="Daughter">
                <div class="absolute -top-1 -right-1 w-3.5 h-3.5 bg-neutral-200 rounded-full flex items-center justify-center border border-white cursor-pointer hover:bg-feedback-warning">
                   <svg class="w-2 h-2 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                </div>
                <div class="text-[9px] text-center mt-1 font-medium text-[#8C847E]">女儿</div>
             </div>
          </div>
        </div>

        <!-- PRO 功能：创建照护组 / 管理他人计划 -->
        <div class="relative bg-gradient-to-br from-[#1C1A19] to-[#2D2926] rounded-[24px] p-5 shadow-brand-md overflow-hidden active-overlay cursor-pointer mt-3" onclick="window.location.href='10-family-groups-list.html'">
          <div class="absolute inset-0 pro-shimmer pointer-events-none"></div>
          <div class="relative z-10 flex items-center justify-between">
            <div class="flex items-center">
              <div class="w-10 h-10 rounded-full bg-yellow-500/20 flex items-center justify-center text-yellow-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
              </div>
              <div class="ml-4">
                <div class="flex items-center space-x-1.5">
                   <h4 class="text-base font-bold text-[#F9F7F3]">家人的用药</h4>
                   <span class="bg-yellow-400 text-yellow-900 text-[9px] font-black px-1.5 py-0.5 rounded uppercase tracking-wider">PRO</span>
                </div>
                <p class="text-[11px] text-[#F9F7F3]/70 font-medium mt-0.5 leading-snug">解锁多群组计划<br>与影子账户代管功能</p>
              </div>
            </div>
            <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
               <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
          </div>
        </div>
      </section>

      <!-- 3. 亲情定制包 (Pro Services) -->
      <section class="mt-8">
        <h3 class="text-sm font-bold text-[#2D2926] px-1 mb-4">特别的爱</h3>
        <div class="grid grid-cols-2 gap-3 opacity-60">
          <div class="bg-white rounded-2xl p-4 border border-neutral-100 shadow-none active-overlay space-y-2 cursor-pointer relative overflow-hidden group">
            <div class="absolute inset-0 bg-neutral-50/50 pointer-events-none transition-colors group-active:bg-transparent"></div>
            <div class="relative z-10 flex justify-between items-start">
               <div class="w-8 h-8 rounded-full bg-neutral-100 text-neutral-400 flex items-center justify-center grayscale">
                 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
               </div>
               <span class="bg-neutral-200 text-neutral-500 text-[8px] font-black px-1 rounded uppercase flex items-center"><svg class="w-2.5 h-2.5 mr-0.5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>PRO</span>
            </div>
            <div class="relative z-10">
               <div class="text-[13px] font-bold text-[#8C847E]">家人语音播报</div>
               <div class="text-[10px] text-neutral-400 mt-0.5">熟悉的唠叨</div>
            </div>
          </div>
          
          <div class="bg-white rounded-2xl p-4 border border-neutral-100 shadow-none active-overlay space-y-2 cursor-pointer relative overflow-hidden group">
            <div class="absolute inset-0 bg-neutral-50/50 pointer-events-none transition-colors group-active:bg-transparent"></div>
            <div class="relative z-10 flex justify-between items-start">
               <div class="w-8 h-8 rounded-full bg-neutral-100 text-neutral-400 flex items-center justify-center grayscale">
                 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
               </div>
               <span class="bg-neutral-200 text-neutral-500 text-[8px] font-black px-1 rounded uppercase flex items-center"><svg class="w-2.5 h-2.5 mr-0.5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>PRO</span>
            </div>
            <div class="relative z-10">
               <div class="text-[13px] font-bold text-[#8C847E]">家庭背景照</div>
               <div class="text-[10px] text-neutral-400 mt-0.5">点缀打卡光阴</div>
            </div>
          </div>
        </div>
      </section>

      <!-- 4. 基础设置 -->
      <section class="mt-8 mb-4">
         <div class="bg-white rounded-2xl shadow-sm divide-y divide-neutral-50 px-4">
            <div class="py-4 flex justify-between items-center active-overlay cursor-pointer">
               <span class="text-[13px] font-bold text-[#2D2926]">防打扰设置</span>
               <svg class="w-4 h-4 text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </div>
            <div class="py-4 flex justify-between items-center active-overlay cursor-pointer" onclick="window.location.href='08-feature-voting.html'">
               <div class="flex items-center space-x-2">
                 <span class="text-[13px] font-bold text-[#2D2926]">功能许愿池</span>
                 <span class="bg-brand-primary text-white text-[8px] font-bold px-1.5 py-0.5 rounded-full">投票</span>
               </div>
               <svg class="w-4 h-4 text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </div>
            <div class="py-4 flex justify-between items-center active-overlay cursor-pointer" onclick="window.location.href='07-help-feedback.html'">
               <span class="text-[13px] font-bold text-[#2D2926]">使用帮助与反馈</span>
               <svg class="w-4 h-4 text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </div>
         </div>
      </section>

    </div>

    <!-- 5. 底部导航栏 (Merged Style from Home Page) -->
    <div class="absolute bottom-0 w-full h-[50px] bg-[#F9F7F3]/95 backdrop-blur-xl border-t border-black/5 flex justify-around items-center px-2 z-[60] mb-[env(safe-area-inset-bottom)]">
      <div class="flex flex-col items-center justify-center w-1/3 text-[#8C847E] active-overlay py-1 cursor-pointer">
        <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        <span class="text-[9px] font-bold scale-90">日历</span>
      </div>
      
      <div class="flex flex-col items-center justify-center w-1/3 text-[#8C847E] active-overlay py-1 cursor-pointer" onclick="window.location.href='01-home.html'">
        <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span class="text-[9px] font-bold scale-90">首页</span>
      </div>

      <!-- Active: 我的 -->
      <div class="flex flex-col items-center justify-center w-1/3 text-brand-primary active-overlay py-1">
        <svg class="w-6 h-6 mb-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span class="text-[9px] font-bold scale-90">我的</span>
      </div>
    </div>

    <!-- 安全区底色适配 -->
    <div class="absolute bottom-0 w-full h-[env(safe-area-inset-bottom)] bg-[#F9F7F3]"></div>

    <!-- 安全区提示条 (iOS Home Indicator) -->
    <div class="absolute bottom-1 w-1/3 h-1.5 bg-neutral-300 rounded-full left-1/2 -translate-x-1/2 opacity-50"></div>

  </div>
</body>
</html>
