<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>萱草日签 - 家人照护(异常处理)</title>
  <link id="theme-css" rel="stylesheet" href="themes/default.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#fdf8f6',
              100: '#f2e8e5',
              primary: '#2D2926',
            },
            wechat: {
              green: '#07C160',
              light: '#E1F6EA',
            },
            surface: {
              glass: 'rgba(255, 255, 255, 0.75)',
            }
          },
          boxShadow: {
            'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.04)',
            'glass-sm': '0 4px 16px 0 rgba(0, 0, 0, 0.02)',
            'glow-amber': '0 0 20px 0 rgba(245, 158, 11, 0.15)',
            'glow-green': '0 8px 24px -4px rgba(7, 193, 96, 0.3)',
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'pulse-soft': 'pulseSoft 3s ease-in-out infinite',
            'breathe': 'breathe 4s ease-in-out infinite',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(12px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1', boxShadow: '0 0 0 0 rgba(244, 63, 94, 0.1)' },
              '50%': { opacity: '0.9', boxShadow: '0 0 0 6px rgba(244, 63, 94, 0)' },
            },
            breathe: {
              '0%, 100%': { transform: 'scale(1)', opacity: '0.6' },
              '50%': { transform: 'scale(1.05)', opacity: '0.9' },
            }
          }
        }
      }
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Smooth button press effect */
    .btn-press {
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-press:active {
      transform: scale(0.96);
    }
    
    /* Glassmorphism backdrop filter */
    .glass-panel {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    /* Ambient animated background */
    .ambient-bg {
      position: absolute;
      top: 0; left: 0; right: 0; height: 100%;
      background: radial-gradient(circle at 50% -10%, #Fef6f3 0%, #f7f7f9 40%, #f2f2f6 100%);
      z-index: 0;
      pointer-events: none;
    }
    
    .stagger-1 { animation-delay: 0.1s; opacity: 0; }
    .stagger-2 { animation-delay: 0.2s; opacity: 0; }
    .stagger-3 { animation-delay: 0.3s; opacity: 0; }
  </style>
</head>
<body class="bg-neutral-900 flex items-center justify-center min-h-screen font-sans antialiased text-neutral-800 selection:bg-brand-primary selection:text-white">
  
  <!-- Mobile Device Simulator Container -->
  <div class="relative w-full max-w-[375px] h-[812px] bg-white shadow-2xl overflow-hidden flex flex-col border-[8px] border-neutral-900 rounded-[50px] isolate">
    
    <!-- Beautiful Ambient Background -->
    <div class="ambient-bg"></div>

    <!-- 1. Header NavBar -->
    <div class="shrink-0 z-50 pt-11 px-4 pb-2 relative">
      <div class="flex items-center justify-between h-10">
        <div class="w-20"></div>
        <h2 class="text-[17px] font-bold text-neutral-900 tracking-tight">萱草日签</h2>
        <div class="w-[82px] h-[28px] bg-white/40 backdrop-blur-md rounded-full border border-white/60 flex items-center justify-around px-2 py-1 shadow-sm">
           <div class="flex space-x-1 items-center">
             <div class="w-1 h-1 rounded-full bg-neutral-800"></div>
             <div class="w-1.5 h-1.5 rounded-full bg-neutral-800"></div>
           </div>
           <div class="w-[1px] h-3 bg-neutral-300"></div>
           <div class="w-3.5 h-3.5 rounded-full border-[1.5px] border-neutral-800"></div>
        </div>
      </div>
    </div>

    <!-- Scrollable Body -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-24 relative z-10">
      
      <!-- 2. Identity Toggle (Family Care is ACTIVE) -->
      <div class="sticky top-0 z-40 flex justify-center pt-2 pb-3 bg-gradient-to-b from-[#f7f7f9] via-[#f7f7f9]/90 to-transparent">
         <div class="h-[32px] bg-neutral-900/90 backdrop-blur-xl rounded-full p-0.5 flex items-center shadow-lg border border-white/10">
            <div class="h-[28px] px-4 rounded-full flex items-center justify-center text-[12px] font-semibold text-white/50 btn-press cursor-pointer hover:text-white/70 transition-colors" onclick="window.location.href='01-home.html'">
              我的用药
            </div>
            <!-- Active State -->
            <div class="h-[28px] px-4 rounded-full flex items-center justify-center text-[12px] font-bold bg-white text-neutral-900 shadow-sm btn-press cursor-pointer relative">
              家人照护
            </div>
         </div>
      </div>

      <!-- 面板头 -->
      <div class="px-5 mt-2 mb-3 flex items-center justify-between animate-fade-in-up">
         <div>
           <h3 class="text-[20px] font-extrabold text-neutral-900 tracking-tight leading-tight">今日异常</h3>
           <p class="text-[12px] text-neutral-500 font-medium mt-0.5">2 位家人需要您的关注</p>
         </div>
         <div class="flex items-center text-[12px] font-semibold text-neutral-500 bg-white/50 px-2.5 py-1.5 rounded-full border border-white/60 shadow-glass-sm btn-press cursor-pointer" onclick="toggleEmptyState()">
            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
            只看异常
         </div>
      </div>

      <!-- 3. Exception Focus Area (异常卡片流) -->
      <div id="exception-view" class="px-4 space-y-4">

         <!-- Alert 1 (Grandpa missed medication - High Priority) -->
         <div class="glass-panel rounded-[20px] p-4 shadow-glass relative overflow-hidden animate-fade-in-up stagger-1 group">
            <!-- 优雅的警告侧边流光效果 -->
            <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-gradient-to-b from-rose-400 to-amber-400 rounded-l-[20px]"></div>
            <!-- 柔和呼吸光晕 -->
            <div class="absolute -top-10 -right-10 w-24 h-24 bg-rose-400/10 rounded-full blur-2xl animate-pulse-soft pointer-events-none"></div>
            
            <div class="flex items-start justify-between relative z-10">
               <!-- 左侧：家人信息 -->
               <div class="flex items-center">
                  <div class="relative">
                     <div class="w-12 h-12 rounded-[16px] bg-gradient-to-br from-rose-50 to-orange-50 p-[1.5px] shadow-sm">
                       <img class="w-full h-full rounded-[14px] object-cover" src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=transparent" alt="Grandpa">
                     </div>
                     <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-white rounded-full flex items-center justify-center shadow-md border border-neutral-50/50">
                       <div class="w-4 h-4 rounded-full bg-rose-50 flex items-center justify-center">
                         <svg class="w-3 h-3 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                       </div>
                     </div>
                  </div>
                  <div class="ml-3 min-w-0">
                     <!-- 跨组聚合归属 kicker（默认家庭仍展示其原始组名，为 Pro 多组场景预留；自身事件不渲染） -->
                     <div class="text-[10px] font-semibold text-neutral-400 leading-tight tracking-wide truncate max-w-[140px] mb-0.5">赵叔叔的家庭</div>
                     <div class="text-[15px] font-bold text-neutral-900">爷爷</div>
                     <div class="text-[11px] font-semibold text-rose-500 mt-0.5 flex items-center bg-rose-50 px-1.5 py-0.5 rounded w-fit">
                        <svg class="w-3 h-3 mr-1 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        延时 2.5 小时
                     </div>
                  </div>
               </div>
               
               <!-- 右侧：药品概要 -->
               <div class="text-right">
                  <div class="text-[14px] font-bold text-neutral-900">降压药</div>
                  <div class="text-[11px] font-medium text-neutral-400 mt-0.5">晨间 08:00</div>
               </div>
            </div>

            <!-- 底部：高级操作区 (高优干预：语音通话) -->
            <div class="mt-4 flex items-center space-x-2.5 relative z-10">
               <div class="flex-1 bg-gradient-to-r from-wechat-green to-[#06ad56] text-white h-[40px] rounded-[12px] flex items-center justify-center text-[13px] font-bold shadow-glow-green cursor-pointer btn-press">
                  <svg class="w-4 h-4 mr-1.5 shrink-0 opacity-90" fill="currentColor" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                  微信语音通话
               </div>
               <div class="w-[40px] h-[40px] shrink-0 rounded-[12px] bg-white/80 border border-white flex items-center justify-center text-neutral-400 shadow-sm cursor-pointer btn-press hover:bg-neutral-50 transition-colors" onclick="openActionSheet()" title="处置警报">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"></path></svg>
               </div>
            </div>
         </div>

         <!-- Alert 2 (Daughter missed medication - Medium Priority) -->
         <div class="glass-panel rounded-[20px] p-4 shadow-glass relative overflow-hidden animate-fade-in-up stagger-2">
            <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-gradient-to-b from-amber-300 to-orange-300 rounded-l-[20px]"></div>
            
            <div class="flex items-start justify-between relative z-10">
               <div class="flex items-center">
                  <div class="relative">
                     <div class="w-12 h-12 rounded-[16px] bg-gradient-to-br from-blue-50 to-indigo-50 p-[1.5px] shadow-sm">
                       <img class="w-full h-full rounded-[14px] object-cover" src="https://api.dicebear.com/7.x/notionists/svg?seed=Lily&backgroundColor=transparent" alt="Daughter">
                     </div>
                     <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-white rounded-full flex items-center justify-center shadow-md border border-neutral-50/50">
                        <div class="w-4 h-4 rounded-full bg-amber-50 flex items-center justify-center">
                          <svg class="w-3 h-3 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        </div>
                     </div>
                  </div>
                  <div class="ml-3 min-w-0">
                     <!-- 默认家庭场景：受邀者视角下命名层会翻译为「{owner}的家庭」，owner 视角下保留原始组名；此处示意 owner 视角的"我的家庭"。 -->
                     <div class="text-[10px] font-semibold text-neutral-400 leading-tight tracking-wide truncate max-w-[140px] mb-0.5">我的家庭</div>
                     <div class="text-[15px] font-bold text-neutral-900">女儿</div>
                     <div class="text-[11px] font-semibold text-amber-600 mt-0.5 flex items-center bg-amber-50 px-1.5 py-0.5 rounded w-fit">
                        <svg class="w-3 h-3 mr-1 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        延时 45 分钟
                     </div>
                  </div>
               </div>
               <div class="text-right">
                  <div class="text-[14px] font-bold text-neutral-900">复合维生素</div>
                  <div class="text-[11px] font-medium text-neutral-400 mt-0.5">午间 13:00</div>
               </div>
            </div>
            
            <!-- 底部：低优干预：轻量化提醒 -->
            <div class="mt-4 flex items-center space-x-2.5 relative z-10">
               <div class="flex-1 bg-white border border-wechat-green/30 text-wechat-green h-[40px] rounded-[12px] flex items-center justify-center text-[13px] font-bold shadow-sm cursor-pointer btn-press hover:bg-wechat-green/5 transition-colors">
                  <svg class="w-4 h-4 mr-1.5 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M8.5 13.5c-2.48 0-4.5-1.79-4.5-4s2.02-4 4.5-4 4.5 1.79 4.5 4-2.02 4-4.5 4zm6.5 6c-2.21 0-4-1.34-4-3s1.79-3 4-3 4 1.34 4 3-1.79 3-4 3z"/></svg>
                  微信拍一拍提醒
               </div>
               <div class="w-[40px] h-[40px] shrink-0 rounded-[12px] bg-white/80 border border-white flex items-center justify-center text-neutral-400 shadow-sm cursor-pointer btn-press hover:bg-neutral-50 transition-colors" onclick="openActionSheet()" title="处置警报">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"></path></svg>
               </div>
            </div>
         </div>

      </div>

      <!-- 4. All-Clear Empty State (极致的安心感) -->
      <div id="all-clear-view" class="hidden px-6 flex flex-col items-center justify-center mt-12 animate-fade-in-up">
         <!-- Beautiful glowing orb -->
         <div class="relative w-28 h-28 flex items-center justify-center">
            <div class="absolute inset-0 bg-emerald-400/20 rounded-full blur-xl animate-breathe"></div>
            <div class="absolute inset-3 bg-gradient-to-br from-emerald-100 to-teal-50 rounded-full shadow-inner border border-white/50"></div>
            <div class="relative w-12 h-12 bg-white rounded-full shadow-glass flex items-center justify-center text-emerald-500 z-10">
               <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
         </div>
         
         <div class="text-center mt-6 relative z-10">
           <h3 class="text-[18px] font-extrabold text-neutral-900 tracking-tight">今日照护完美达成</h3>
           <p class="text-[13px] text-neutral-500 font-medium mt-1.5 leading-relaxed max-w-[220px] mx-auto">
             没有任何异常漏服发生<br>您和家人度过了健康安心的一天
           </p>
         </div>
         
         <div class="mt-8 bg-white/60 backdrop-blur-md border border-white px-5 py-2.5 rounded-full flex items-center justify-center text-neutral-800 text-[13px] font-bold shadow-glass-sm btn-press cursor-pointer hover:bg-white/80 transition-colors">
            查看历史健康报告
            <svg class="w-3.5 h-3.5 ml-1 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
         </div>
      </div>

    </div>

    <!-- 5. 底部导航栏 (Home is active) -->
    <div class="absolute bottom-0 w-full bg-white/80 backdrop-blur-xl border-t border-white/40 shadow-[0_-8px_30px_rgba(0,0,0,0.02)] z-[60] pb-[env(safe-area-inset-bottom)] pt-1 px-6">
      <div class="flex justify-between items-center h-[50px] relative">
        
        <!-- Tab: Calendar -->
        <div class="flex flex-col items-center justify-center w-14 text-neutral-400 btn-press cursor-pointer" onclick="window.location.href='06-calendar.html'">
          <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          <span class="text-[10px] font-bold">日历</span>
        </div>
        
        <!-- Tab: Home (Active) -->
        <div class="flex flex-col items-center justify-center w-14 text-neutral-900 btn-press cursor-pointer relative" onclick="window.location.href='01-home.html'">
          <div class="absolute -top-1 w-8 h-[3px] bg-neutral-900 rounded-b-full"></div>
          <svg class="w-5 h-5 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L4 9v12h16V9l-8-6zm0 2.5l6 4.5v9h-12v-9l6-4.5z"/></svg>
          <span class="text-[10px] font-bold">首页</span>
        </div>

        <!-- Tab: Profile -->
        <div class="flex flex-col items-center justify-center w-14 text-neutral-400 btn-press cursor-pointer" onclick="window.location.href='02-profile.html'">
          <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          <span class="text-[10px] font-bold">我的</span>
        </div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="absolute bottom-2 w-1/3 h-[5px] bg-neutral-900 rounded-full left-1/2 -translate-x-1/2 z-[70]"></div>

    <!-- Action Sheet Modal (Alert Resolution) -->
    <div id="action-sheet-backdrop" class="fixed inset-0 bg-neutral-900/40 backdrop-blur-sm z-[100] opacity-0 pointer-events-none transition-opacity duration-300" onclick="closeActionSheet()"></div>
    <div id="action-sheet" class="fixed bottom-0 left-0 right-0 max-w-[375px] mx-auto bg-white rounded-t-[32px] z-[101] transform translate-y-full transition-transform duration-300 ease-out shadow-[0_-10px_40px_rgba(0,0,0,0.1)] pb-[env(safe-area-inset-bottom)]">
      <div class="p-6 pb-8">
        <div class="w-12 h-1.5 bg-neutral-200 rounded-full mx-auto mb-6"></div>
        <h3 class="text-[18px] font-extrabold text-neutral-900 text-center mb-6 tracking-tight">警报处置</h3>
        
        <div class="space-y-3">
          <!-- 选项1：代为打卡 -->
          <div class="w-full bg-neutral-50 hover:bg-emerald-50 rounded-[20px] p-4 flex items-center cursor-pointer btn-press border border-neutral-100 transition-colors" onclick="closeActionSheet(); toggleEmptyState();">
            <div class="w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 mr-4 shadow-sm">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <div class="flex-1 text-left">
              <div class="text-[16px] font-bold text-neutral-900">已确认家人服药</div>
              <div class="text-[13px] font-medium text-neutral-500 mt-0.5">代长辈打卡，消除警报</div>
            </div>
          </div>
          
          <!-- 选项2：稍后提醒 -->
          <div class="w-full bg-neutral-50 hover:bg-amber-50 rounded-[20px] p-4 flex items-center cursor-pointer btn-press border border-neutral-100 transition-colors" onclick="closeActionSheet()">
            <div class="w-12 h-12 rounded-full bg-amber-100 flex items-center justify-center text-amber-600 mr-4 shadow-sm">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div class="flex-1 text-left">
              <div class="text-[16px] font-bold text-neutral-900">稍后再次提醒</div>
              <div class="text-[13px] font-medium text-neutral-500 mt-0.5">暂缓警报，30分钟后再挂出</div>
            </div>
          </div>
          
          <!-- 选项3：忽略 -->
          <div class="w-full bg-neutral-50 hover:bg-neutral-100 rounded-[20px] p-4 flex items-center cursor-pointer btn-press border border-neutral-100 transition-colors" onclick="closeActionSheet()">
            <div class="w-12 h-12 rounded-full bg-neutral-200 flex items-center justify-center text-neutral-500 mr-4 shadow-sm">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>
            </div>
            <div class="flex-1 text-left">
              <div class="text-[16px] font-bold text-neutral-900">已知晓，暂不干预</div>
              <div class="text-[13px] font-medium text-neutral-500 mt-0.5">单次忽略，卡片归档到日历</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Action Sheet Logic
    function openActionSheet() {
      const backdrop = document.getElementById('action-sheet-backdrop');
      const sheet = document.getElementById('action-sheet');
      backdrop.classList.remove('opacity-0', 'pointer-events-none');
      sheet.classList.remove('translate-y-full');
    }

    function closeActionSheet() {
      const backdrop = document.getElementById('action-sheet-backdrop');
      const sheet = document.getElementById('action-sheet');
      backdrop.classList.add('opacity-0', 'pointer-events-none');
      sheet.classList.add('translate-y-full');
    }

    // 切换空状态的逻辑
    function toggleEmptyState() {
       const exceptionView = document.getElementById('exception-view');
       const allClearView = document.getElementById('all-clear-view');
       const headerTitle = document.querySelector('h3');
       const headerSubtitle = document.querySelector('p.text-neutral-500');
       
       if (exceptionView.classList.contains('hidden')) {
          // 切换回异常状态
          exceptionView.classList.remove('hidden');
          allClearView.classList.add('hidden');
          headerTitle.innerText = "今日异常";
          headerSubtitle.innerText = "2 位家人需要您的关注";
       } else {
          // 切换到全绿状态
          exceptionView.classList.add('hidden');
          allClearView.classList.remove('hidden');
          headerTitle.innerText = "健康日历";
          headerSubtitle.innerText = "一切正常，继续保持";
       }
    }
  </script>
</body>
</html>
