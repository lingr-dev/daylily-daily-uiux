<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>萱草日签 - 家人照护(异常处理)</title>
  <link id="theme-css" rel="stylesheet" href="themes/default.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: 'rgb(var(--brand-primary) / <alpha-value>)',
            },
            feedback: {
              success: 'rgb(var(--feedback-success) / <alpha-value>)',
              warning: 'rgb(var(--feedback-warning) / <alpha-value>)',
            },
            wechat: {
              green: '#07C160',
            }
          },
          boxShadow: {
            'brand-sm': '0 2px 4px -1px rgb(var(--shadow-color) / 0.06), 0 1px 2px -1px rgb(var(--shadow-color) / 0.04)',
            'alert': '0 10px 40px -10px rgba(220, 38, 38, 0.2)',
          }
        }
      }
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .active-overlay { position: relative; overflow: hidden; }
    .active-overlay::after { content: ''; position: absolute; inset: 0; background-color: rgba(0,0,0,0); transition: background-color 0.1s; pointer-events: none; }
    .active-overlay:active::after { background-color: rgba(0,0,0,0.08); }
    .btn-bounce { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .btn-bounce:active { transform: scale(0.95); }
    .pulse-border { animation: pulseBorder 2s infinite; }
    @keyframes pulseBorder {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body class="bg-neutral-100 flex items-center justify-center min-h-screen font-sans antialiased text-[#4A443F]">
  <!-- Mobile Container -->
  <div class="relative w-full max-w-[375px] h-[812px] bg-[#F9F7F3] shadow-2xl overflow-hidden flex flex-col border-[8px] border-neutral-900 rounded-[50px]">
    
    <!-- 1. Header NavBar -->
    <div class="shrink-0 z-50 bg-[#F9F7F3]/80 backdrop-blur-md">
      <div class="h-11 w-full"></div>
      <div class="h-11 w-full flex items-center justify-between px-4 relative border-b border-black/5">
        <div class="w-20"></div>
        <h2 class="text-[19px] font-bold text-[#2D2926]">萱草日签</h2>
        <div class="w-[87px] h-8 bg-black/5 rounded-full border border-black/5 flex items-center justify-around px-2 py-1 opacity-40">
           <div class="w-1.5 h-1.5 rounded-full bg-black"></div>
           <div class="w-1 h-1 rounded-full bg-black"></div>
           <div class="w-[1px] h-3 bg-black/20"></div>
           <div class="w-4 h-4 rounded-full border-2 border-black"></div>
        </div>
      </div>
    </div>

    <!-- Scrollable Body -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-24 relative">
      
      <!-- 2. Identity Toggle (Family Care is ACTIVE) -->
      <div class="sticky top-0 z-40 flex justify-center pt-3 pb-2 bg-gradient-to-b from-[#F9F7F3] to-transparent pointer-events-none">
         <div class="pointer-events-auto h-[36px] bg-[#2D2926]/90 backdrop-blur-lg rounded-full px-1 flex items-center shadow-lg border border-white/5 transition-all">
            <div class="h-7 px-5 rounded-full flex items-center justify-center text-[13px] font-bold text-white/50 cursor-pointer active-overlay" onclick="window.location.href='01-home.html'">
              我的用药
            </div>
            <!-- 此时 家人照护 处于激活状态 -->
            <div class="h-7 px-5 rounded-full flex items-center justify-center text-[13px] font-bold bg-white text-neutral-900 shadow-sm cursor-pointer relative">
              家人照护
            </div>
         </div>
      </div>

      <!-- 面板头：文案宣告这是纯真的异常大盘 -->
      <div class="px-6 mt-4 mb-2 flex items-center justify-between">
         <h3 class="text-[20px] font-bold text-[#2D2926] tracking-tight">今日漏服警告</h3>
         <div class="flex items-center text-[14px] font-medium text-[#8C847E]" onclick="toggleEmptyState()">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
            只看异常
         </div>
      </div>

      <!-- 3. Exception Focus Area (异常卡片流) -->
      <div id="exception-view" class="px-5 space-y-4 pt-2">

         <!-- Alert 1 (Grandpa missed medication) -->
         <div class="bg-white rounded-[24px] p-5 border-2 border-red-500/20 shadow-alert relative overflow-hidden pulse-border">
            <!-- 红色装饰渐变底 -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-red-500/5 rounded-bl-[100px] pointer-events-none"></div>
            
            <div class="flex items-start justify-between relative z-10">
               <!-- 左侧家人信息 -->
               <div class="flex items-center">
                  <div class="relative">
                     <img class="w-16 h-16 rounded-full border border-neutral-100 shadow-sm" src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=fce7f3" alt="Grandpa">
                     <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-white rounded-full flex items-center justify-center shadow-sm">
                       <svg class="w-3.5 h-3.5 text-orange-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                     </div>
                  </div>
                  <div class="ml-4">
                     <div class="text-[18px] font-bold text-[#2D2926]">爷爷</div>
                     <div class="text-[14px] font-medium text-red-500 mt-0.5 flex items-center">
                        <svg class="w-3.5 h-3.5 mr-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        延时 2.5 小时
                     </div>
                  </div>
               </div>
               <!-- 右侧漏服详情 (不再是罗列，而是核心突出对象) -->
               <div class="text-right flex flex-col justify-center">
                  <div class="text-[18px] font-bold text-[#2D2926]">降压药</div>
                  <div class="text-[14px] font-medium text-[#8C847E] mt-1">晨间 08:00</div>
               </div>
            </div>

            <!-- 底部核心操作：一键微信提醒 -->
            <div class="mt-6 flex items-center space-x-3">
               <div class="flex-1 bg-wechat-green text-white min-h-[56px] py-3.5 rounded-[28px] flex items-center justify-center text-[16px] font-bold shadow-[0_8px_16px_-6px_rgba(7,193,96,0.4)] cursor-pointer active-overlay btn-bounce px-4">
                  <svg class="w-5 h-5 mr-1.5 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M8.5 13.5c-2.48 0-4.5-1.79-4.5-4s2.02-4 4.5-4 4.5 1.79 4.5 4-2.02 4-4.5 4zm6.5 6c-2.21 0-4-1.34-4-3s1.79-3 4-3 4 1.34 4 3-1.79 3-4 3z"/></svg>
                  微信拍一拍提醒
               </div>
               <!-- 忽略按钮 -->
               <div class="w-14 h-14 shrink-0 rounded-full bg-neutral-100 flex items-center justify-center text-neutral-400 cursor-pointer active-overlay btn-bounce" title="他已经吃过了/暂不处理">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
               </div>
            </div>
         </div>

         <!-- Alert 2 (Daughter missed medication) -->
         <div class="bg-white rounded-[24px] p-5 border border-neutral-100 shadow-brand-sm relative">
            <div class="flex items-start justify-between relative z-10">
               <div class="flex items-center">
                  <div class="relative">
                     <img class="w-16 h-16 rounded-full border border-neutral-100 shadow-sm" src="https://api.dicebear.com/7.x/notionists/svg?seed=Lily&backgroundColor=dbeafe" alt="Daughter">
                     <div class="absolute bottom-0 -right-1 w-6 h-6 bg-wechat-green rounded-full flex items-center justify-center border border-white shadow-sm">
                        <svg class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8.5 13.5c-2.48 0-4.5-1.79-4.5-4s2.02-4 4.5-4 4.5 1.79 4.5 4-2.02 4-4.5 4zm6.5 6c-2.21 0-4-1.34-4-3s1.79-3 4-3 4 1.34 4 3-1.79 3-4 3z"/></svg>
                     </div>
                  </div>
                  <div class="ml-4">
                     <div class="text-[18px] font-bold text-[#2D2926]">女儿</div>
                     <div class="text-[14px] font-medium text-feedback-warning mt-0.5 flex items-center">
                        <svg class="w-3.5 h-3.5 mr-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        延时 45 分钟
                     </div>
                  </div>
               </div>
               <div class="text-right flex flex-col justify-center">
                  <div class="text-[18px] font-bold text-[#2D2926]">复合维生素</div>
                  <div class="text-[14px] font-medium text-[#8C847E] mt-1">午间 13:00</div>
               </div>
            </div>
            <div class="mt-6 flex items-center space-x-3">
               <div class="flex-1 bg-wechat-green text-white min-h-[56px] py-3.5 rounded-[28px] flex items-center justify-center text-[16px] font-bold shadow-[0_8px_16px_-6px_rgba(7,193,96,0.3)] cursor-pointer active-overlay btn-bounce px-4">
                  <svg class="w-5 h-5 mr-1.5 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M8.5 13.5c-2.48 0-4.5-1.79-4.5-4s2.02-4 4.5-4 4.5 1.79 4.5 4-2.02 4-4.5 4zm6.5 6c-2.21 0-4-1.34-4-3s1.79-3 4-3 4 1.34 4 3-1.79 3-4 3z"/></svg>
                  微信发送提醒
               </div>
               <div class="w-14 h-14 shrink-0 rounded-full bg-neutral-100 flex items-center justify-center text-neutral-400 cursor-pointer active-overlay btn-bounce">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
               </div>
            </div>
         </div>

      </div>

      <!-- 4. All-Clear Empty State (极致的安心感) -->
      <div id="all-clear-view" class="hidden px-5 flex flex-col items-center justify-center mt-20">
         <div class="w-32 h-32 rounded-full bg-feedback-success/10 flex items-center justify-center relative">
            <div class="absolute inset-0 bg-feedback-success/20 rounded-full animate-ping opacity-50 blur-xl"></div>
            <div class="w-20 h-20 rounded-full bg-white shadow-lg flex items-center justify-center text-feedback-success z-10">
               <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
            </div>
         </div>
         <h3 class="text-[20px] font-bold text-[#2D2926] mt-8">今日家人用药均已达标</h3>
         <p class="text-[15px] text-[#8C847E] font-medium mt-2">没有任何漏服，岁月静好</p>
         
         <div class="mt-12 bg-white/50 border border-neutral-200/60 px-6 py-3 min-h-[44px] rounded-full flex items-center justify-center text-[#8C847E] text-[14px] font-bold">
            前往日历查看近期报告 >
         </div>
      </div>

    </div>

    <!-- 5. 底部导航栏 (Home is active) -->
    <div class="absolute bottom-0 w-full h-[50px] bg-[#F9F7F3]/95 backdrop-blur-xl border-t border-black/5 flex justify-around items-center px-2 z-[60] mb-[env(safe-area-inset-bottom)]">
      <div class="flex flex-col items-center justify-center w-1/3 text-[#8C847E] active-overlay py-1 cursor-pointer" onclick="window.location.href='06-calendar.html'">
        <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        <span class="text-xs font-bold mt-1">日历</span>
      </div>
      
      <div class="flex flex-col items-center justify-center w-1/3 text-brand-primary active-overlay py-1 cursor-pointer" onclick="window.location.href='01-home.html'">
        <svg class="w-6 h-6 mb-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L4 9v12h16V9l-8-6zm0 2.5l6 4.5v9h-12v-9l6-4.5z"/></svg>
        <span class="text-xs font-bold mt-1">首页</span>
      </div>

      <div class="flex flex-col items-center justify-center w-1/3 text-[#8C847E] active-overlay py-1 cursor-pointer" onclick="window.location.href='02-profile.html'">
        <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        <span class="text-xs font-bold mt-1">我的</span>
      </div>
    </div>

    <!-- 安全区 -->
    <div class="absolute bottom-0 w-full h-[env(safe-area-inset-bottom)] bg-[#F9F7F3]"></div>
    <div class="absolute bottom-1 w-1/3 h-1.5 bg-neutral-300 rounded-full left-1/2 -translate-x-1/2 opacity-50 z-[70]"></div>

  </div>

  <script>
    // 简单的用于演示空状态和异常状态切换的逻辑
    function toggleEmptyState() {
       const exceptionView = document.getElementById('exception-view');
       const allClearView = document.getElementById('all-clear-view');
       
       if (exceptionView.classList.contains('hidden')) {
          exceptionView.classList.remove('hidden');
          allClearView.classList.add('hidden');
       } else {
          exceptionView.classList.add('hidden');
          allClearView.classList.remove('hidden');
       }
    }
  </script>
</body>
</html>
