<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>萱草日签 - 照护空间管理</title>
  <link id="theme-css" rel="stylesheet" href="themes/default.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#FF9500', 
              premium: '#D4AF37',
            },
          },
          boxShadow: {
            'brand-sm': '0 2px 4px -1px rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.04)',
            'premium': '0 10px 30px -10px rgba(212, 175, 55, 0.4)',
          }
        }
      }
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .active-overlay { position: relative; overflow: hidden; }
    .active-overlay::after { content: ''; position: absolute; inset: 0; background-color: rgba(0,0,0,0); transition: background-color 0.1s; pointer-events: none; }
    .active-overlay:active::after { background-color: rgba(0,0,0,0.08); }
    .btn-bounce { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .btn-bounce:active { transform: scale(0.96); }
    
    .bottom-sheet {
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bottom-sheet.open {
      transform: translateY(0);
    }
    .overlay {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-neutral-100 flex items-center justify-center min-h-screen font-sans antialiased text-[#4A443F]">
  <div class="relative w-full max-w-[375px] h-[812px] bg-[#F9F7F3] shadow-2xl overflow-hidden flex flex-col border-[8px] border-neutral-900 rounded-[50px]">
    
    <!-- Dev Toggle -->
    <div class="absolute top-14 right-4 z-[100] bg-black/80 text-white text-[10px] px-3 py-2 rounded-full cursor-pointer hover:bg-black transition-colors shadow-lg border border-neutral-700 font-bold" onclick="toggleProMode()">
       切换 PRO 态
    </div>

    <!-- NavBar -->
    <div class="shrink-0 z-50 bg-[#F9F7F3]/90 backdrop-blur-md">
      <div class="h-11 w-full"></div>
      <div class="h-11 w-full flex items-center justify-between px-4">
        <div class="w-[87px] flex items-center cursor-pointer" onclick="window.history.back()">
          <svg class="w-6 h-6 text-[#2D2926]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
        </div>
        <h2 class="text-[17px] font-bold text-[#2D2926]">家庭照护空间</h2>
        <div class="w-[87px]"></div>
      </div>
    </div>

    <!-- Body -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-32">
      
      <!-- Intro -->
      <section class="mt-2 mb-6 px-5">
        <p class="text-[13px] text-[#8C847E] leading-relaxed">
          在这里管理您创建的家庭圈，或查看由亲友邀请您加入的圈子。
        </p>
      </section>

      <!-- 模块 A: 我主理的照护空间 -->
      <section class="mb-8 px-4">
         <div class="flex items-center justify-between mb-3 px-1">
            <h4 class="text-[14px] font-bold text-[#2D2926] tracking-wide flex items-center">
               我主理的 <span class="ml-2 text-[10px] font-normal text-neutral-400 bg-neutral-200/50 px-1.5 py-0.5 rounded">我是创建者</span>
            </h4>
            <span id="pro-badge" class="hidden bg-gradient-to-r from-yellow-400 to-yellow-600 text-white text-[9px] px-1.5 rounded font-black italic">PRO</span>
         </div>
         
         <div class="space-y-3" id="managed-spaces">
             <!-- 默认主阵地 -->
             <div class="bg-white rounded-[24px] p-5 shadow-brand-sm border-2 border-brand-primary active-overlay relative cursor-pointer" onclick="window.location.href='09-family-management.html'">
                <div class="flex items-start">
                   <div class="w-12 h-12 rounded-2xl bg-orange-50 flex items-center justify-center text-brand-primary">
                     <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                   </div>
                   <div class="ml-4 mt-1">
                     <h3 class="text-[17px] font-bold text-[#2D2926]">我的家庭</h3>
                     <div class="flex items-center space-x-1 mt-1 text-neutral-400">
                        <span class="text-[11px] font-bold text-[#8C847E]">4 位成员</span>
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                     </div>
                   </div>
                </div>
                <div class="mt-4 pt-4 border-t border-neutral-50 flex space-x-2">
                   <div class="w-8 h-8 rounded-full border-2 border-brand-primary p-px"><div class="w-full h-full bg-brand-primary rounded-full flex items-center justify-center text-white text-[9px] font-bold">我</div></div>
                   <img class="w-8 h-8 rounded-full border-2 border-white ring-1 ring-neutral-100" src="https://api.dicebear.com/7.x/notionists/svg?seed=Lily&backgroundColor=dbeafe" alt="">
                   <img class="w-8 h-8 rounded-full border-2 border-white ring-1 ring-neutral-100 grayscale opacity-80" src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=fce7f3" alt="">
                </div>
             </div>

             <!-- Pro 用户的第二个圈子 (默认隐藏) -->
             <div id="pro-second-space" class="hidden bg-white rounded-[24px] p-5 shadow-brand-sm border border-neutral-200 active-overlay relative cursor-pointer animate-[fadeIn_0.3s_ease-out]" onclick="window.location.href='09-family-management.html'">
                 <div class="flex items-start">
                    <div class="w-12 h-12 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-500">
                      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    </div>
                    <div class="ml-4 mt-1">
                      <h3 class="text-[17px] font-bold text-[#2D2926]">娘家的长辈</h3>
                      <div class="flex items-center space-x-1 mt-1 text-neutral-400">
                         <span class="text-[11px] font-bold text-[#8C847E]">3 位成员</span>
                         <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                      </div>
                    </div>
                 </div>
                 <div class="mt-4 pt-4 border-t border-neutral-50 flex space-x-2">
                    <div class="w-8 h-8 rounded-full border-2 border-brand-primary p-px"><div class="w-full h-full bg-brand-primary rounded-full flex items-center justify-center text-white text-[9px] font-bold">我</div></div>
                    <img class="w-8 h-8 rounded-full border-2 border-white ring-1 ring-neutral-100" src="https://api.dicebear.com/7.x/notionists/svg?seed=A" alt="">
                 </div>
             </div>
         </div>

         <!-- 新建按钮 -->
         <button onclick="handleCreateSpace()" class="w-full mt-3 bg-white border border-dashed border-neutral-300 text-[#2D2926] font-bold text-[14px] py-3.5 rounded-2xl active:bg-neutral-50 btn-bounce flex items-center justify-center shadow-sm">
            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg> 新建独立照护组
         </button>
      </section>

      <!-- 模块 B: 我协助的照护空间 (完全免费展示) -->
      <section class="px-4 mb-12">
         <h4 class="text-[14px] font-bold text-[#2D2926] px-1 mb-3 tracking-wide flex items-center">
            我协助的 <span class="ml-2 text-[10px] font-normal text-neutral-400 bg-neutral-200/50 px-1.5 py-0.5 rounded">受亲友邀请</span>
         </h4>
         
         <div class="space-y-3">
             <!-- 协助组 1 -->
             <div class="bg-white rounded-[24px] p-5 shadow-brand-sm border border-neutral-200 active-overlay relative cursor-pointer btn-bounce" onclick="window.location.href='09-family-management.html'">
                <div class="flex items-start">
                   <div class="w-12 h-12 rounded-2xl bg-purple-50 flex items-center justify-center text-purple-500">
                     <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                   </div>
                   <div class="ml-4 mt-1">
                     <h3 class="text-[17px] font-bold text-[#2D2926]">婆家护理群</h3>
                     <div class="flex items-center text-neutral-400 mt-1">
                        <span class="text-[10px] font-bold text-neutral-500 bg-neutral-100 px-1.5 py-0.5 rounded">创建人: 老公</span>
                        <span class="text-[11px] font-bold text-[#8C847E] ml-2">5 位成员</span>
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                     </div>
                   </div>
                </div>
                <div class="mt-4 pt-4 border-t border-neutral-50 flex space-x-2 overflow-hidden">
                   <!-- 协助组里，自己只是参与者 -->
                   <img class="w-8 h-8 rounded-full border-2 border-white ring-1 ring-neutral-100 shrink-0" src="https://api.dicebear.com/7.x/notionists/svg?seed=Husband" alt="">
                   <div class="w-8 h-8 rounded-full border-2 border-white p-px shrink-0"><div class="w-full h-full bg-neutral-200 rounded-full flex items-center justify-center text-neutral-600 text-[9px] font-bold">我</div></div>
                   <img class="w-8 h-8 rounded-full border-2 border-white ring-1 ring-neutral-100 shrink-0 grayscale opacity-80" src="https://api.dicebear.com/7.x/notionists/svg?seed=Y" alt="">
                   <div class="w-8 h-8 rounded-full border-2 border-white ring-1 ring-neutral-100 bg-neutral-100 flex items-center justify-center text-[10px] font-bold text-neutral-400 shrink-0">+2</div>
                </div>
             </div>

             <!-- 协助组 空态 (假设还有一个加入按钮) -->
             <div class="w-full mt-3 bg-transparent border-2 border-dashed border-neutral-200 text-[#8C847E] font-medium text-[13px] py-4 rounded-2xl active:bg-neutral-50 transition-all flex items-center justify-center cursor-pointer">
                通过微信群邀请卡片，可加入更多圈子
             </div>
         </div>
      </section>

    </div>

    <!-- 底部占位 -->
    <div class="absolute bottom-0 w-full h-[env(safe-area-inset-bottom)] bg-[#F9F7F3] z-40"></div>
    <div class="absolute bottom-1 w-1/3 h-1.5 bg-neutral-300 rounded-full left-1/2 -translate-x-1/2 opacity-50 z-[70]"></div>

    <!-- 暗色遮罩 -->
    <div id="overlay" class="overlay absolute inset-0 bg-black/40 z-50" onclick="closeUpsell()"></div>

    <!-- PRO 升级底部弹窗 -->
    <div id="upsell-sheet" class="bottom-sheet absolute bottom-0 w-full bg-white rounded-t-[24px] z-[60] pb-[env(safe-area-inset-bottom)]">
      <div class="p-6 text-center pt-8">
        <div class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center cursor-pointer bg-neutral-100 rounded-full" onclick="closeUpsell()">
          <svg class="w-5 h-5 text-neutral-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </div>
        
        <div class="w-16 h-16 bg-gradient-to-br from-yellow-100 to-yellow-50 shadow-sm rounded-full mx-auto mb-4 flex items-center justify-center border border-yellow-200">
           <svg class="w-8 h-8 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4L22 9.4l-6 4.4 2.3 7.1-6-4.4-6 4.4 2.3-7.1-6-4.4 7.6 0z" /></svg>
        </div>
        
        <h3 class="text-[20px] font-bold text-[#2D2926] mb-2">解锁无限独立空间</h3>
        <p class="text-[13px] text-content-secondary leading-relaxed px-2 mb-8">
          基础账户仅支持主理 1 个照护空间。<br>升级亲情版，可为不同长辈创建独立的记录与提醒圈子，隐私互不干扰。
        </p>

        <button onclick="window.location.href='11-pro-landing.html'" class="w-full py-3.5 rounded-full bg-gradient-to-r from-[#D4AF37] to-[#B8860B] text-white font-bold text-[16px] shadow-premium btn-bounce">
          了解亲情版
        </button>
      </div>
    </div>

  </div>

  <script>
    let isPro = false;
    
    function toggleProMode() {
       isPro = !isPro;
       const proSecondSpace = document.getElementById('pro-second-space');
       const proBadge = document.getElementById('pro-badge');
       if(isPro) {
          proSecondSpace.classList.remove('hidden');
          proBadge.classList.remove('hidden');
       } else {
          proSecondSpace.classList.add('hidden');
          proBadge.classList.add('hidden');
       }
    }

    const overlay = document.getElementById('overlay');
    const upsellSheet = document.getElementById('upsell-sheet');

    function handleCreateSpace() {
       if (isPro) {
          alert('前端演示：您已经是 PRO 会员，将跳转至填写家庭名称的表单页。');
       } else {
          // 拉起升级说明弹窗
          overlay.classList.add('open');
          upsellSheet.classList.add('open');
       }
    }

    function closeUpsell() {
       overlay.classList.remove('open');
       upsellSheet.classList.remove('open');
    }
  </script>
</body>
</html>
