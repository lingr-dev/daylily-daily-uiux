<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>萱草日签 - 我的用药</title>
  <link id="theme-css" rel="stylesheet" href="themes/default.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: 'rgb(var(--brand-primary) / <alpha-value>)',
              secondary: 'rgb(var(--brand-secondary) / <alpha-value>)',
              'primary-muted': 'rgb(var(--brand-primary-muted) / <alpha-value>)',
            },
            surface: {
              base: 'rgb(var(--surface-base) / <alpha-value>)',
              container: 'rgb(var(--surface-container) / <alpha-value>)',
              elevated: 'rgb(var(--surface-elevated) / <alpha-value>)',
            },
            border: {
              subtle: 'rgb(var(--border-subtle) / <alpha-value>)',
            },
            feedback: {
              success: 'rgb(var(--feedback-success) / <alpha-value>)',
            }
          },
          boxShadow: {
            'brand-sm': '0 2px 4px -1px rgb(var(--shadow-color) / 0.06), 0 1px 2px -1px rgb(var(--shadow-color) / 0.04)',
            'brand-md': '0 4px 6px -1px rgb(var(--shadow-color) / 0.1), 0 2px 4px -2px rgb(var(--shadow-color) / 0.05)',
          }
        }
      }
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .active-overlay { position: relative; overflow: hidden; }
    .active-overlay::after { content: ''; position: absolute; inset: 0; background-color: rgba(0,0,0,0); transition: background-color 0.1s; pointer-events: none; }
    .active-overlay:active::after { background-color: rgba(0,0,0,0.08); }
    
    /* 胶囊切换平滑过渡 */
    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-neutral-100 flex items-center justify-center min-h-screen font-sans antialiased text-[#4A443F]">
  <!-- Mobile Container -->
  <div class="relative w-full max-w-[375px] h-[812px] bg-[#F9F7F3] shadow-2xl overflow-hidden flex flex-col border-[8px] border-neutral-900 rounded-[50px]">
    
    <!-- 1. Header NavBar with Add Button -->
    <div class="shrink-0 z-50 bg-[#F9F7F3]/90 backdrop-blur-md pb-3">
      <!-- 状态栏占位 -->
      <div class="h-11 w-full"></div>
      <!-- 标题栏 -->
      <div class="h-11 w-full flex items-center justify-between px-4 relative">
        <div class="w-16 flex items-center active-overlay cursor-pointer" onclick="window.location.href='02-profile.html'">
           <svg class="w-5 h-5 text-[#2D2926]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
        </div>
        <h2 class="text-[17px] font-bold text-[#2D2926]">日常用药</h2>
        <div class="w-16 flex justify-end">
           <div class="flex items-center active-overlay cursor-pointer text-brand-primary font-bold pr-1">
             <svg class="w-5 h-5 mr-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
             <span class="text-[15px]">添加</span>
           </div>
        </div>
      </div>

      <!-- 2. Segmented Control (早 中 晚) -->
      <div class="px-5 mt-4">
        <div class="flex bg-neutral-200/50 p-1.5 rounded-2xl relative">
          <!-- Active Background Indicator (Mocked physically for DOM #1) -->
          <div id="tab-indicator" class="absolute top-1.5 bottom-1.5 left-1.5 w-[calc(33.33%-4px)] bg-white rounded-xl shadow-sm transition-transform duration-300 ease-in-out pointer-events-none border border-black/5"></div>
          
          <button onclick="switchTab(0)" class="tab-btn relative z-10 flex-1 flex flex-col items-center justify-center py-2 text-[#2D2926] transition-colors">
            <span class="text-sm font-bold">晨间</span>
            <span class="text-[9px] font-medium opacity-60 mt-0.5">06:00-11:00</span>
          </button>
          <button onclick="switchTab(1)" class="tab-btn relative z-10 flex-1 flex flex-col items-center justify-center py-2 text-[#8C847E] transition-colors">
            <span class="text-sm font-bold">午间</span>
            <span class="text-[9px] font-medium opacity-60 mt-0.5">11:00-15:00</span>
          </button>
          <button onclick="switchTab(2)" class="tab-btn relative z-10 flex-1 flex flex-col items-center justify-center py-2 text-[#8C847E] transition-colors">
            <span class="text-sm font-bold">晚间</span>
            <span class="text-[9px] font-medium opacity-60 mt-0.5">15:00-24:00</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Scrollable Body -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-10 px-4 mt-2">

      <!-- Morning Tab Content -->
      <div id="tab-0" class="tab-content active pt-4">
        <div class="space-y-3">
          
          <!-- Card 1 -->
          <div class="bg-white rounded-[20px] p-4 shadow-brand-sm flex items-center active-overlay cursor-pointer relative overflow-hidden group">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-brand-primary"></div>
            
            <div class="flex flex-col items-center justify-center w-14 shrink-0 border-r border-[#F9F7F3] pr-2">
               <span class="text-lg font-bold text-[#2D2926] tracking-tight">08:00</span>
            </div>
            
            <div class="ml-4 flex-1">
               <h3 class="text-[15px] font-bold text-[#2D2926]">红盒子降压药</h3>
               <div class="text-[12px] text-[#8C847E] font-medium mt-0.5 flex items-center">
                 <svg class="w-3.5 h-3.5 mr-1 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                 1 片
               </div>
            </div>
            
            <div class="w-8 h-8 rounded-full bg-neutral-50 flex items-center justify-center text-neutral-400 group-hover:bg-neutral-100 transition-colors">
               <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </div>
          </div>

          <!-- Card 2 -->
          <div class="bg-white rounded-[20px] p-4 shadow-brand-sm flex items-center active-overlay cursor-pointer relative overflow-hidden group">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-brand-primary"></div>
            
            <div class="flex flex-col items-center justify-center w-14 shrink-0 border-r border-[#F9F7F3] pr-2">
               <span class="text-lg font-bold text-[#2D2926] tracking-tight">08:30</span>
            </div>
            
            <div class="ml-4 flex-1">
               <h3 class="text-[15px] font-bold text-[#2D2926]">复合维生素</h3>
               <div class="text-[12px] text-[#8C847E] font-medium mt-0.5 flex items-center">
                 <svg class="w-3.5 h-3.5 mr-1 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                 1 粒
               </div>
            </div>
            
            <div class="w-8 h-8 rounded-full bg-neutral-50 flex items-center justify-center text-neutral-400 group-hover:bg-neutral-100 transition-colors">
               <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </div>
          </div>
          
        </div>
      </div>

      <!-- Noon Tab Content (Empty State Simulation) -->
      <div id="tab-1" class="tab-content pt-16">
         <div class="flex flex-col items-center justify-center px-6">
            <div class="w-32 h-32 rounded-full bg-neutral-100 border-4 border-white shadow-sm flex items-center justify-center text-neutral-300 mb-6">
               <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
            </div>
            <h3 class="text-sm font-bold text-[#8C847E]">午间没有用药安排</h3>
            <p class="text-[11px] text-[#8C847E]/60 text-center mt-1">给药箱减负，午间好好休息吧 ~</p>
            
            <button class="mt-8 bg-white border border-neutral-200 text-[#2D2926] text-[13px] font-bold px-6 py-2.5 rounded-full shadow-sm active-overlay">
               + 添加午间提醒
            </button>
         </div>
      </div>

      <!-- Evening Tab Content -->
      <div id="tab-2" class="tab-content pt-4">
        <div class="space-y-3">
          <div class="bg-white rounded-[20px] p-4 shadow-brand-sm flex items-center active-overlay cursor-pointer relative overflow-hidden group">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-brand-primary"></div>
            <div class="flex flex-col items-center justify-center w-14 shrink-0 border-r border-[#F9F7F3] pr-2">
               <span class="text-lg font-bold text-[#2D2926] tracking-tight">19:00</span>
            </div>
            <div class="ml-4 flex-1">
               <h3 class="text-[15px] font-bold text-[#2D2926]">深海鱼油</h3>
               <div class="text-[12px] text-[#8C847E] font-medium mt-0.5 flex items-center">
                 <svg class="w-3.5 h-3.5 mr-1 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                 饭后 1 粒
               </div>
            </div>
            <div class="w-8 h-8 rounded-full bg-neutral-50 flex items-center justify-center text-neutral-400 group-hover:bg-neutral-100 transition-colors">
               <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- 安全区底色适配 -->
    <div class="absolute bottom-0 w-full h-[env(safe-area-inset-bottom)] bg-[#F9F7F3]"></div>
    <!-- 安全区提示条 (iOS Home Indicator) -->
    <div class="absolute bottom-1 w-1/3 h-1.5 bg-neutral-300 rounded-full left-1/2 -translate-x-1/2 opacity-50 z-50"></div>

  </div>

  <script>
    function switchTab(index) {
      // Update Indicator
      const indicator = document.getElementById('tab-indicator');
      const percentage = index * 100;
      indicator.style.transform = `translateX(${percentage}%)`;

      // Update Text Colors
      const btns = document.querySelectorAll('.tab-btn');
      btns.forEach((btn, i) => {
        if (i === index) {
          btn.classList.replace('text-[#8C847E]', 'text-[#2D2926]');
        } else {
          btn.classList.replace('text-[#2D2926]', 'text-[#8C847E]');
        }
      });

      // Update Content Panels
      const contents = document.querySelectorAll('.tab-content');
      contents.forEach((content, i) => {
        if (i === index) {
          content.classList.add('active');
        } else {
          content.classList.remove('active');
        }
      });
    }
  </script>
</body>
</html>
