<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>萱草日签 - 日历视图原型</title>
  <link id="theme-css" rel="stylesheet" href="themes/default.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: 'rgb(var(--brand-primary) / <alpha-value>)',
              secondary: 'rgb(var(--brand-secondary) / <alpha-value>)',
              'primary-muted': 'rgb(var(--brand-primary-muted) / <alpha-value>)',
            },
            surface: {
              base: 'rgb(var(--surface-base) / <alpha-value>)',
              container: 'rgb(var(--surface-container) / <alpha-value>)',
              elevated: 'rgb(var(--surface-elevated) / <alpha-value>)',
            },
            content: {
              primary: 'rgb(var(--content-primary) / <alpha-value>)',
              secondary: 'rgb(var(--content-secondary) / <alpha-value>)',
              inverse: 'rgb(var(--content-inverse) / <alpha-value>)',
            },
            border: {
              subtle: 'rgb(var(--border-subtle) / <alpha-value>)',
            },
            feedback: {
              success: 'rgb(var(--feedback-success) / <alpha-value>)',
              'success-bg': 'rgb(var(--feedback-success-bg) / <alpha-value>)',
              'success-text': 'rgb(var(--feedback-success-text) / <alpha-value>)',
              warning: 'rgb(var(--feedback-warning) / <alpha-value>)',
              'warning-bg': 'rgb(var(--feedback-warning-bg) / <alpha-value>)',
              'warning-text': 'rgb(var(--feedback-warning-text) / <alpha-value>)',
            }
          },
          boxShadow: {
            'brand-sm': '0 2px 4px -1px rgb(var(--shadow-color) / 0.06), 0 1px 2px -1px rgb(var(--shadow-color) / 0.04)',
            'brand-md': '0 4px 6px -1px rgb(var(--shadow-color) / 0.1), 0 2px 4px -2px rgb(var(--shadow-color) / 0.05)',
            'hero': '0 20px 50px -12px rgb(var(--brand-primary) / 0.3)',
          },
          borderRadius: {
            '4xl': '32px',
          }
        }
      }
    }
  </script>
  <style>
    /* 交互遮罩 */
    .active-overlay { position: relative; overflow: hidden; }
    .active-overlay::after { content: ''; position: absolute; inset: 0; background-color: rgba(0,0,0,0); transition: background-color 0.1s; pointer-events: none; }
    .active-overlay:active::after { background-color: rgba(0,0,0,0.08); }
    
    /* 隐藏滚动条 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 模拟微信小程序的弹窗和动效 */
    .btn-bounce { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .btn-bounce:active { transform: scale(0.92); }

    /* 日历选中态：在方块外侧绘制一圈明显的描边圈，绝不遮盖本身的健康状态色彩 */
    .day-selected { position: relative; z-index: 10; transform: scale(1.05); }
    .day-selected::after { content: ''; position: absolute; inset: -4px; border: 3px solid #2D2926; border-radius: 50%; pointer-events: none; }
  </style>
</head>
<body class="bg-neutral-100 flex items-center justify-center min-h-screen font-sans antialiased text-[#4A443F]">

  <!-- 移动端模拟容器 -->
  <div class="relative w-full max-w-[375px] h-[812px] bg-[#F9F7F3] shadow-2xl overflow-hidden flex flex-col border-[8px] border-neutral-900 rounded-[50px]">
    
    <!-- 1. 微信小程序原生导航栏 -->
    <div class="shrink-0 z-50 bg-[#F9F7F3]/80 backdrop-blur-md">
      <div class="h-11 w-full"></div>
      <div class="h-11 w-full flex items-center justify-between px-4 relative border-b border-black/5">
        <div class="w-20"><span class="invisible">返回</span></div>
        <h2 class="text-[19px] font-bold text-[#2D2926]">健康周历</h2>
        <!-- 胶囊按钮模拟 -->
        <div class="w-[87px] h-8 bg-black/5 rounded-full border border-black/5 flex items-center justify-around px-2 py-1 opacity-40">
           <div class="w-1.5 h-1.5 rounded-full bg-black"></div>
           <div class="w-1 h-1 rounded-full bg-black"></div>
           <div class="w-[1px] h-3 bg-black/20"></div>
           <div class="w-4 h-4 rounded-full border-2 border-black"></div>
        </div>
      </div>
    </div>

    <!-- 主体内容滚动区 -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-24 relative">
      
      <!-- 月份总览 -->
      <section class="px-6 pt-6 pb-2">
        <div class="flex items-center justify-between mb-4">
          <button class="p-2 active-overlay rounded-full text-neutral-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
          </button>
          <div class="flex flex-col items-center">
            <h3 class="text-[18px] font-bold text-[#2D2926]">2026年 4月</h3>
            <span class="text-[14px] font-medium text-brand-primary mt-1">本月已坚持 14 天</span>
          </div>
          <button class="p-2 active-overlay rounded-full text-neutral-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </button>
        </div>
      </section>

      <!-- 热力图日历网格 -->
      <section class="px-4 mb-6">
        <div class="bg-white rounded-[24px] p-4 shadow-sm border border-neutral-100">
          <!-- 星期头 -->
          <div class="grid grid-cols-7 gap-1 text-center mb-4">
            <div class="text-[13px] font-bold text-neutral-400">日</div>
            <div class="text-[13px] font-bold text-[#2D2926]">一</div>
            <div class="text-[13px] font-bold text-[#2D2926]">二</div>
            <div class="text-[13px] font-bold text-[#2D2926]">三</div>
            <div class="text-[13px] font-bold text-[#2D2926]">四</div>
            <div class="text-[13px] font-bold text-[#2D2926]">五</div>
            <div class="text-[13px] font-bold text-neutral-400">六</div>
          </div>
          
          <!-- 日期格子 -->
          <div class="grid grid-cols-7 gap-2 text-center" id="calendar-grid">
            <!-- 上月留白 -->
            <div class="aspect-square flex items-center justify-center opacity-0"><span class="text-base font-bold"></span></div>
            <div class="aspect-square flex items-center justify-center opacity-0"><span class="text-base font-bold"></span></div>
            <div class="aspect-square flex items-center justify-center opacity-0"><span class="text-base font-bold"></span></div>
            
            <!-- 过去的日子：全勤 (绿色) -->
            <div class="aspect-square flex items-center justify-center rounded-full bg-feedback-success text-white shadow-sm btn-bounce cursor-pointer"><span class="text-base font-bold">1</span></div>
            <div class="aspect-square flex items-center justify-center rounded-full bg-feedback-success text-white shadow-sm btn-bounce cursor-pointer"><span class="text-base font-bold">2</span></div>
            <div class="aspect-square flex items-center justify-center rounded-full bg-feedback-success text-white shadow-sm btn-bounce cursor-pointer"><span class="text-base font-bold">3</span></div>
            <!-- 异常补服日 (暖黄色) -->
            <div class="aspect-square flex items-center justify-center rounded-full bg-feedback-warning text-white shadow-sm btn-bounce cursor-pointer"><span class="text-base font-bold">4</span></div>
            <div class="aspect-square flex items-center justify-center rounded-full bg-feedback-success text-white shadow-sm btn-bounce cursor-pointer"><span class="text-base font-bold">5</span></div>
            <div class="aspect-square flex items-center justify-center rounded-full bg-feedback-success text-white shadow-sm btn-bounce cursor-pointer"><span class="text-base font-bold">6</span></div>
            <div class="aspect-square flex items-center justify-center rounded-full bg-feedback-success text-white shadow-sm btn-bounce cursor-pointer"><span class="text-base font-bold">7</span></div>
            <!-- 彻底漏服日 (无背景，但红点标识或直接红色细边框) -->
            <div class="relative aspect-square flex items-center justify-center rounded-full bg-white border-2 border-red-300 text-[#2D2926] btn-bounce cursor-pointer">
              <span class="absolute top-1 right-1 w-1.5 h-1.5 rounded-full bg-red-500"></span>
              <span class="text-base font-bold">8</span>
            </div>
            
            <div class="aspect-square flex items-center justify-center rounded-full bg-feedback-success text-white shadow-sm btn-bounce cursor-pointer"><span class="text-base font-bold">9</span></div>
            <div class="aspect-square flex items-center justify-center rounded-full bg-feedback-success text-white shadow-sm btn-bounce cursor-pointer"><span class="text-base font-bold">10</span></div>
            
            <!-- 选中日 (当前选中 11号) -->
            <div class="aspect-square flex items-center justify-center rounded-full bg-feedback-success text-white shadow-sm btn-bounce cursor-pointer day-selected" id="selected-day">
              <span class="text-base font-bold">11</span>
            </div>

            <!-- 未来的日子 (灰色描边或浅色) -->
            <div class="aspect-square flex items-center justify-center rounded-full bg-neutral-100 text-neutral-400 font-medium btn-bounce"><span class="text-base">12</span></div>
            <div class="aspect-square flex items-center justify-center rounded-full bg-neutral-100 text-neutral-400 font-medium btn-bounce"><span class="text-base">13</span></div>
            <div class="aspect-square flex items-center justify-center rounded-full bg-neutral-100 text-neutral-400 font-medium btn-bounce"><span class="text-base">14</span></div>
            
          </div>
        </div>
      </section>

      <!-- 单日详情流 (Timeline) -->
      <section class="px-8 mt-2 transition-opacity duration-300" id="daily-timeline">
        <div class="flex items-center justify-between mb-5 px-1">
          <h3 class="text-base font-bold text-[#2D2926]">4月11日 详情</h3>
          <span class="text-[13px] font-medium text-brand-primary bg-brand-primary/10 px-3 py-1 rounded-full">已完成 2/3</span>
        </div>
        
        <div class="relative pl-6 border-l border-neutral-200 ml-1.5 space-y-8 pb-4">
          
          <!-- 任务 A：已完成 -->
          <div class="relative pt-1 opacity-60">
            <div class="absolute -left-[31px] top-2.5 w-4 h-4 rounded-full bg-white border-2 border-feedback-success flex items-center justify-center">
              <svg class="w-2.5 h-2.5 text-feedback-success" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
            </div>
            <div class="flex items-center">
              <div class="w-12 h-12 rounded-full bg-brand-primary-muted flex items-center justify-center text-brand-primary text-[15px] font-bold">我</div>
              <div class="ml-3">
                <div class="text-[17px] font-bold text-neutral-500 line-through">早间服药</div>
                <div class="text-[14px] text-neutral-400 mt-0.5">08:00 降压药 · 1片</div>
              </div>
            </div>
          </div>

          <!-- 任务 B：补服 -->
          <div class="relative pt-1">
            <div class="absolute -left-[31px] top-2.5 w-4 h-4 rounded-full bg-white border-2 border-feedback-warning flex items-center justify-center">
              <div class="w-1.5 h-1.5 rounded-full bg-feedback-warning"></div>
            </div>
            
            <div class="flex items-center">
              <img class="w-12 h-12 rounded-full border-2 border-white shadow-sm" src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=ccfbf1" alt="Avatar">
              <div class="ml-3">
                <div class="text-[17px] font-bold text-[#2D2926]">奶奶 <span class="text-feedback-warning ml-1 text-[13px]">补服</span></div>
                <div class="text-[14px] text-[#8C847E] mt-0.5 font-medium">10:00 (原 09:30) 降糖药</div>
              </div>
            </div>
          </div>

          <!-- 任务 C：下一个待办 -->
          <div class="relative pt-1">
            <div class="absolute -left-[31px] top-2.5 w-4 h-4 rounded-full bg-white border-2 border-brand-primary flex items-center justify-center">
               <div class="w-1.5 h-1.5 rounded-full bg-brand-primary"></div>
            </div>
            
            <div class="flex items-center">
              <div class="w-12 h-12 rounded-full bg-brand-primary-muted flex items-center justify-center text-brand-primary text-[15px] font-bold">我</div>
              <div class="ml-3">
                <div class="text-[17px] font-bold text-[#2D2926]">午间服药</div>
                <div class="text-[14px] text-[#8C847E] mt-0.5 font-medium">12:30 鱼油 · 2粒</div>
              </div>
            </div>
          </div>

        </div>
      </section>

    </div>

    <!-- 5. 底部导航栏 -->
    <div class="absolute bottom-0 w-full h-[50px] bg-[#F9F7F3]/95 backdrop-blur-xl border-t border-black/5 flex justify-around items-center px-2 z-[60] mb-[env(safe-area-inset-bottom)]">
      
      <!-- "日历" Active -->
      <div class="flex flex-col items-center justify-center w-1/3 text-brand-primary active-overlay py-1 cursor-pointer">
        <!-- Filled calendar icon -->
        <svg class="w-6 h-6 mb-0.5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd" />
        </svg>
        <span class="text-xs font-bold mt-1">日历</span>
      </div>
      
      <!-- "首页" Inactive -->
      <div class="flex flex-col items-center justify-center w-1/3 text-[#8C847E] active-overlay py-1 cursor-pointer" onclick="window.location.href='01-home.html'">
        <!-- Outline home icon -->
        <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span class="text-xs font-bold mt-1">首页</span>
      </div>

      <!-- "我的" Inactive -->
      <div class="flex flex-col items-center justify-center w-1/3 text-[#8C847E] active-overlay py-1 cursor-pointer" onclick="window.location.href='02-profile.html'">
        <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        <span class="text-xs font-bold mt-1">我的</span>
      </div>
    </div>

    <!-- 安全区底色适配 -->
    <div class="absolute bottom-0 w-full h-[env(safe-area-inset-bottom)] bg-[#F9F7F3]"></div>
    <!-- 安全区提示条 (iOS Home Indicator) -->
    <div class="absolute bottom-1 w-1/3 h-1.5 bg-neutral-300 rounded-full left-1/2 -translate-x-1/2 opacity-50"></div>
  </div>

  <script>
    // 简单的交互模拟：点击任意有色的日期格子，触发底部时间轴的动效更新
    const gridItems = document.querySelectorAll('#calendar-grid > div:not(.opacity-0):not(.bg-neutral-100)');
    const timeline = document.getElementById('daily-timeline');
    const selectedDay = document.getElementById('selected-day');

    gridItems.forEach(item => {
      item.addEventListener('click', () => {
        // 移除其他格子的选中态
        const currentActive = document.querySelector('.day-selected');
        if (currentActive) {
          currentActive.classList.remove('day-selected');
        }
        
        // 给当前点击格子附加选中层
        item.classList.add('day-selected');
        
        // 重新触发下方的淡入动效
        timeline.classList.remove('opacity-100');
        timeline.classList.add('opacity-0');
        
        setTimeout(() => {
          timeline.classList.remove('opacity-0');
          timeline.classList.add('opacity-100');
        }, 150);
      });
    });
  </script>
</body>
</html>
